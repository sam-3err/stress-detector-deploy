<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Stress Detector</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
            --text-primary: #ffffff;
            --text-secondary: #b0c4de;
        }

        * {
            box-sizing: border-box;
        }

        body, html {

            margin: 0;
            padding: 0;

            width: 100%;
            min-height: 100vh;

            font-family: 'Outfit', sans-serif;

            background: var(--bg-gradient);
            background-size: 400% 400%;

            animation: gradientBG 15s ease infinite;

            display: flex;
            justify-content: center;
            align-items: center;

            color: var(--text-primary);
        }

        @keyframes gradientBG {

            0% { background-position: 0% 50%; }

            50% { background-position: 100% 50%; }

            100% { background-position: 0% 50%; }
        }

        .container {

            width: 92%;
            max-width: 850px;

            padding: 2rem;

            background: var(--card-bg);

            backdrop-filter: blur(15px);

            border-radius: 24px;

            border: 1px solid var(--glass-border);

            box-shadow: 0 8px 32px rgba(0,0,0,0.37);

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {

            margin: 0;

            font-size: 2.7rem;

            font-weight: 600;

            background: linear-gradient(#fff, #a0eaff);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {

            margin-top: 0.5rem;

            color: var(--text-secondary);

            font-size: 1.1rem;
        }

        .video-wrapper {

            width: 100%;
            max-width: 640px;

            border-radius: 16px;

            padding: 4px;

            background: linear-gradient(45deg, #ff007f, #00d4ff);

            box-shadow: 0 0 20px rgba(0,212,255,0.4);
        }

        .video-container {

            width: 100%;

            aspect-ratio: 4/3;

            background: #000;

            border-radius: 12px;

            overflow: hidden;

            position: relative;
        }

        .video-stream {

            width: 100%;
            height: 100%;

            object-fit: cover;
        }

        .controls {

            margin-top: 2rem;

            display: flex;

            gap: 1rem;

            flex-wrap: wrap;

            justify-content: center;
        }

        button {

            border: none;

            padding: 12px 28px;

            border-radius: 30px;

            font-size: 1rem;

            font-weight: 600;

            cursor: pointer;

            font-family: 'Outfit', sans-serif;
        }

        .capture-btn {

            background: linear-gradient(45deg, #00d4ff, #00ff88);

            color: #000;
        }

        .upload-btn {

            background: linear-gradient(45deg, #ff007f, #7f00ff);

            color: white;
        }

        .status-panel {

            margin-top: 2rem;

            display: flex;

            gap: 1rem;

            flex-wrap: wrap;

            justify-content: center;
        }

        .status-badge {

            background: rgba(0,0,0,0.3);

            padding: 0.8rem 1.5rem;

            border-radius: 30px;

            border: 1px solid rgba(255,255,255,0.1);
        }

        .section {

            margin-top: 2rem;

            width: 100%;

            max-width: 640px;
        }

        .section h3 {

            color: #a0eaff;

            border-bottom: 1px solid rgba(255,255,255,0.1);

            padding-bottom: 0.5rem;
        }

        #emotionBars {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 1rem;
        }

        .chart-box {

            background: rgba(0,0,0,0.3);

            padding: 1.5rem;

            border-radius: 16px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">

        <h1>Stress Detector AI</h1>

        <p class="subtitle">
            Deep Neural Emotion & Stress Analysis System
        </p>

    </div>

    <div class="video-wrapper">

        <div class="video-container">

            <!-- LIVE WEBCAM -->
            <video
                id="webcam"
                class="video-stream"
                autoplay
                playsinline>
            </video>

            <!-- HIDDEN CANVAS -->
            <canvas
                id="hiddenCanvas"
                style="display:none;">
            </canvas>

            <!-- SNAPSHOT -->
            <canvas
                id="snapshotCanvas"
                class="video-stream"
                style="display:none;">
            </canvas>

        </div>

    </div>

    <!-- CONTROLS -->

    <div class="controls">

        <button
            id="captureBtn"
            class="capture-btn"
            onclick="toggleCapture()">

            📸 Capture Live Frame

        </button>

        <input
            type="file"
            id="imageUpload"
            accept="image/*"
            style="display:none;"
            onchange="uploadImage(event)">

        <button
            class="upload-btn"
            onclick="document.getElementById('imageUpload').click()">

            📁 Upload Picture

        </button>

    </div>

    <!-- STATUS -->

    <div class="status-panel">

        <div class="status-badge">
            Emotion:
            <strong id="valEmotion">Waiting...</strong>
        </div>

        <div class="status-badge">
            Stress:
            <strong id="valStressPct">0%</strong>
        </div>

        <div class="status-badge" id="badgeLabel">
            Level:
            <strong id="valLabel">Waiting...</strong>
        </div>

    </div>

    <!-- EMOTION BARS -->

    <div class="section">

        <h3>Emotion Breakdown</h3>

        <div id="emotionBars"></div>

    </div>

    <!-- CHART -->

    <div class="section">

        <div class="chart-box">

            <h3>Live Stress Trend</h3>

            <canvas id="stressChart"></canvas>

        </div>

    </div>

</div>

<script>

    let isCaptured = false;
    let isUploaded = false;

    const webcam =
        document.getElementById("webcam");

    const hiddenCanvas =
        document.getElementById("hiddenCanvas");

    const snapshotCanvas =
        document.getElementById("snapshotCanvas");

    // =============================
    // START WEBCAM
    // =============================

    async function startWebcam() {

        try {

            const stream =
                await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: false
                });

            webcam.srcObject = stream;

            startRealtimeAnalysis();

        }
        catch(err) {

            console.error(err);

            alert("Camera access denied.");
        }
    }

    // =============================
    // SEND FRAME TO BACKEND
    // =============================

    async function sendFrameToBackend() {

        if(isCaptured || isUploaded) return;

        const ctx =
            hiddenCanvas.getContext("2d");

        hiddenCanvas.width =
            webcam.videoWidth;

        hiddenCanvas.height =
            webcam.videoHeight;

        ctx.drawImage(
            webcam,
            0,
            0,
            hiddenCanvas.width,
            hiddenCanvas.height
        );

        const imageData =
            hiddenCanvas.toDataURL("image/jpeg");

        try {

            const res = await fetch("/analyze_frame", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    image: imageData
                })

            });

            const data = await res.json();

            updateMetrics(data);

        }
        catch(err) {

            console.error(err);
        }
    }

    // =============================
    // REALTIME LOOP
    // =============================

    function startRealtimeAnalysis() {

        setInterval(() => {

            if(!isCaptured && !isUploaded) {

                sendFrameToBackend();
            }

        }, 1500);
    }

    // =============================
    // UPDATE UI
    // =============================

    function updateMetrics(info) {

        document.getElementById('valEmotion')
            .innerText = info.emotion || 'N/A';

        document.getElementById('valStressPct')
            .innerText =
                Math.round(
                    (info.stress_value || 0) * 100
                ) + '%';

        document.getElementById('valLabel')
            .innerText =
                info.stress_label || 'N/A';

        // emotion bars

        const barsContainer =
            document.getElementById('emotionBars');

        if(info.emotion_probs) {

            let html = '';

            for(const [emo, prob]
                of Object.entries(info.emotion_probs)) {

                const pct =
                    Math.round(prob * 100);

                html += `

                <div style="
                    background: rgba(0,0,0,0.3);
                    padding: 10px;
                    border-radius: 8px;
                ">

                    <div style="
                        display:flex;
                        justify-content:space-between;
                        margin-bottom:5px;
                    ">

                        <span>${emo}</span>
                        <strong>${pct}%</strong>

                    </div>

                    <div style="
                        width:100%;
                        background:rgba(255,255,255,0.1);
                        height:6px;
                        border-radius:4px;
                    ">

                        <div style="
                            width:${pct}%;
                            background:#00d4ff;
                            height:100%;
                        "></div>

                    </div>

                </div>
                `;
            }

            barsContainer.innerHTML = html;
        }

        // chart update

        const stressVal =
            Math.round(
                (info.stress_value || 0) * 100
            );

        const data =
            stressChart.data.datasets[0].data;

        data.push(stressVal);

        data.shift();

        stressChart.update();
    }

    // =============================
    // CAPTURE BUTTON
    // =============================

    function toggleCapture() {

        const btn =
            document.getElementById("captureBtn");

        if(!isCaptured) {

            snapshotCanvas.style.display =
                "block";

            webcam.style.display =
                "none";

            snapshotCanvas.width =
                webcam.videoWidth;

            snapshotCanvas.height =
                webcam.videoHeight;

            const ctx =
                snapshotCanvas.getContext("2d");

            ctx.drawImage(
                webcam,
                0,
                0,
                snapshotCanvas.width,
                snapshotCanvas.height
            );

            btn.innerHTML =
                "🔄 Resume Live Video";

            isCaptured = true;
        }
        else {

            snapshotCanvas.style.display =
                "none";

            webcam.style.display =
                "block";

            btn.innerHTML =
                "📸 Capture Live Frame";

            isCaptured = false;
        }
    }

    // =============================
    // IMAGE UPLOAD
    // =============================

    async function uploadImage(e) {

        const file = e.target.files[0];

        if(!file) return;

        const formData = new FormData();

        formData.append("image", file);

        try {

            const res =
                await fetch('/upload_image', {

                    method: 'POST',
                    body: formData
                });

            const data = await res.json();

            updateMetrics(data.info);

            const img = new Image();

            img.onload = function() {

                webcam.style.display =
                    "none";

                snapshotCanvas.style.display =
                    "block";

                snapshotCanvas.width =
                    img.width;

                snapshotCanvas.height =
                    img.height;

                const ctx =
                    snapshotCanvas.getContext("2d");

                ctx.drawImage(img, 0, 0);
            };

            img.src = data.image;

            isUploaded = true;
            isCaptured = true;

        }
        catch(err) {

            console.error(err);

            alert("Upload failed");
        }
    }

    // =============================
    // CHART
    // =============================

    const ctxChart =
        document.getElementById('stressChart')
            .getContext('2d');

    const stressChart = new Chart(ctxChart, {

        type: 'line',

        data: {

            labels: Array(30).fill(''),

            datasets: [{

                label: 'Stress',

                data: Array(30).fill(0),

                borderColor: '#ff007f',

                backgroundColor:
                    'rgba(255,0,127,0.2)',

                borderWidth: 2,

                fill: true,

                tension: 0.4,

                pointRadius: 0
            }]
        },

        options: {

            responsive: true,

            animation: false,

            scales: {

                y: {

                    beginAtZero: true,

                    max: 100,

                    ticks: {
                        color: '#b0c4de'
                    },

                    grid: {
                        color:
                            'rgba(255,255,255,0.1)'
                    }
                },

                x: {
                    display: false
                }
            },

            plugins: {

                legend: {
                    display: false
                }
            }
        }
    });

    // =============================
    // START APP
    // =============================

    startWebcam();

</script>

</body>
</html>
