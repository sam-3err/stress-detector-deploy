<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stress Detector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.14);
            --text-primary: #ffffff;
            --text-secondary: #b0c4de;
            --accent: #00d4ff;
            --danger: #ff5d7a;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Outfit", sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-primary);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: min(920px, 100%);
            padding: 28px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(15px);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 2.7rem);
            font-weight: 600;
        }

        .subtitle {
            margin: 8px 0 0;
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .video-wrapper {
            width: min(640px, 100%);
            margin: 0 auto;
            padding: 4px;
            border-radius: 16px;
            background: linear-gradient(45deg, #ff007f, #00d4ff);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.35);
        }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
        }

        .video-stream {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls,
        .status-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 22px;
        }

        button {
            min-height: 44px;
            border: 0;
            border-radius: 30px;
            padding: 11px 22px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .capture-btn {
            color: #001115;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
        }

        .upload-btn {
            color: #fff;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
        }

        .status-badge {
            min-width: 150px;
            padding: 12px 18px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            background: rgba(0, 0, 0, 0.28);
            text-align: center;
        }

        .status-badge strong {
            display: block;
            margin-top: 4px;
        }

        .section {
            width: min(640px, 100%);
            margin: 24px auto 0;
        }

        .section h3 {
            margin: 0 0 12px;
            padding-bottom: 8px;
            color: #a0eaff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        #emotionBars {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .emotion-card,
        .chart-box {
            padding: 14px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.28);
        }

        .emotion-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 6px;
        }

        .bar-track {
            width: 100%;
            height: 7px;
            overflow: hidden;
            border-radius: 99px;
            background: rgba(255, 255, 255, 0.12);
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.2s ease;
        }

        .error {
            color: var(--danger);
        }

        @media (max-width: 620px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 18px;
                border-radius: 16px;
            }

            #emotionBars {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <header class="header">
            <h1>Stress Detector AI</h1>
            <p class="subtitle">Live emotion and stress analysis</p>
        </header>

        <section class="video-wrapper">
            <div class="video-container">
                <video id="webcam" class="video-stream" autoplay muted playsinline></video>
                <canvas id="hiddenCanvas" style="display: none;"></canvas>
                <canvas id="snapshotCanvas" class="video-stream" style="display: none;"></canvas>
            </div>
        </section>

        <section class="controls">
            <button id="captureBtn" class="capture-btn" type="button">Capture Live Frame</button>
            <input id="imageUpload" type="file" accept="image/*" style="display: none;">
            <button id="uploadBtn" class="upload-btn" type="button">Upload Picture</button>
        </section>

        <section class="status-panel">
            <div class="status-badge">
                Emotion
                <strong id="valEmotion">Waiting...</strong>
            </div>
            <div class="status-badge">
                Stress
                <strong id="valStressPct">0%</strong>
            </div>
            <div class="status-badge">
                Level
                <strong id="valLabel">Waiting...</strong>
            </div>
        </section>

        <section class="section">
            <h3>Emotion Breakdown</h3>
            <div id="emotionBars"></div>
        </section>

        <section class="section">
            <div class="chart-box">
                <h3>Live Stress Trend</h3>
                <canvas id="stressChart"></canvas>
            </div>
        </section>
    </main>

    <script>
        const EMOTIONS = ["Angry", "Disgust", "Scared", "Happy", "Sad", "Surprised", "Neutral"];

        let isCaptured = false;
        let isUploaded = false;
        let isAnalyzing = false;
        let realtimeTimer = null;

        const webcam = document.getElementById("webcam");
        const hiddenCanvas = document.getElementById("hiddenCanvas");
        const snapshotCanvas = document.getElementById("snapshotCanvas");
        const captureBtn = document.getElementById("captureBtn");
        const uploadBtn = document.getElementById("uploadBtn");
        const imageUpload = document.getElementById("imageUpload");
        const emotionBars = document.getElementById("emotionBars");

        const stressChart = new Chart(
            document.getElementById("stressChart").getContext("2d"),
            {
                type: "line",
                data: {
                    labels: Array(30).fill(""),
                    datasets: [{
                        data: Array(30).fill(0),
                        borderColor: "#ff007f",
                        backgroundColor: "rgba(255, 0, 127, 0.2)",
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    animation: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: { color: "#b0c4de" },
                            grid: { color: "rgba(255, 255, 255, 0.1)" }
                        },
                        x: { display: false }
                    },
                    plugins: { legend: { display: false } }
                }
            }
        );

        function emptyInfo(emotion, label) {
            return {
                emotion,
                stress_value: 0,
                stress_label: label,
                emotion_probs: Object.fromEntries(EMOTIONS.map((name) => [name, 0]))
            };
        }

        function updateMetrics(info) {
            const safeInfo = info || emptyInfo("No Result", "Try again");
            const stressValue = Number(safeInfo.stress_value || 0);
            const stressPercent = Math.max(0, Math.min(100, Math.round(stressValue * 100)));

            document.getElementById("valEmotion").innerText = safeInfo.emotion || "N/A";
            document.getElementById("valStressPct").innerText = `${stressPercent}%`;
            document.getElementById("valLabel").innerText = safeInfo.stress_label || "N/A";

            const probs = safeInfo.emotion_probs || {};
            emotionBars.innerHTML = EMOTIONS.map((emotion) => {
                const pct = Math.max(0, Math.min(100, Math.round(Number(probs[emotion] || 0) * 100)));
                return `
                    <div class="emotion-card">
                        <div class="emotion-row">
                            <span>${emotion}</span>
                            <strong>${pct}%</strong>
                        </div>
                        <div class="bar-track">
                            <div class="bar-fill" style="width: ${pct}%"></div>
                        </div>
                    </div>
                `;
            }).join("");

            const data = stressChart.data.datasets[0].data;
            data.push(stressPercent);
            data.shift();
            stressChart.update();
        }

        async function startWebcam() {
            updateMetrics(emptyInfo("Starting Camera", "Allow camera access"));

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: "user"
                    },
                    audio: false
                });

                webcam.srcObject = stream;
                webcam.onloadedmetadata = () => {
                    webcam.play();
                    updateMetrics(emptyInfo("Analyzing...", "Camera active"));
                    startRealtimeAnalysis();
                };
            } catch (err) {
                console.error("Camera error:", err);
                updateMetrics(emptyInfo("Camera Blocked", "Camera permission needed"));
            }
        }

        async function sendFrameToBackend() {
            if (isCaptured || isUploaded || isAnalyzing) return;
            if (webcam.readyState < 2 || webcam.videoWidth === 0 || webcam.videoHeight === 0) return;

            isAnalyzing = true;

            hiddenCanvas.width = webcam.videoWidth;
            hiddenCanvas.height = webcam.videoHeight;
            hiddenCanvas.getContext("2d").drawImage(webcam, 0, 0, hiddenCanvas.width, hiddenCanvas.height);

            try {
                const res = await fetch("/analyze_frame", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ image: hiddenCanvas.toDataURL("image/jpeg", 0.85) })
                });

                const data = await res.json();
                updateMetrics(data);
            } catch (err) {
                console.error("Analyze error:", err);
                updateMetrics(emptyInfo("Connection Error", "Backend not responding"));
            } finally {
                isAnalyzing = false;
            }
        }

        function startRealtimeAnalysis() {
            if (realtimeTimer) return;
            sendFrameToBackend();
            realtimeTimer = setInterval(sendFrameToBackend, 1500);
        }

        function toggleCapture() {
            if (!isCaptured) {
                if (webcam.videoWidth === 0 || webcam.videoHeight === 0) return;

                snapshotCanvas.width = webcam.videoWidth;
                snapshotCanvas.height = webcam.videoHeight;
                snapshotCanvas.getContext("2d").drawImage(webcam, 0, 0, snapshotCanvas.width, snapshotCanvas.height);

                webcam.style.display = "none";
                snapshotCanvas.style.display = "block";
                captureBtn.innerText = "Resume Live Video";
                isCaptured = true;
                return;
            }

            snapshotCanvas.style.display = "none";
            webcam.style.display = "block";
            captureBtn.innerText = "Capture Live Frame";
            isCaptured = false;
            isUploaded = false;
        }

        async function uploadImage() {
            const file = imageUpload.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append("image", file);

            try {
                const res = await fetch("/upload_image", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();
                if (!res.ok || data.error) {
                    updateMetrics(emptyInfo("Upload Error", data.error || "Upload failed"));
                    return;
                }

                updateMetrics(data.info);

                const img = new Image();
                img.onload = () => {
                    snapshotCanvas.width = img.width;
                    snapshotCanvas.height = img.height;
                    snapshotCanvas.getContext("2d").drawImage(img, 0, 0);
                    webcam.style.display = "none";
                    snapshotCanvas.style.display = "block";
                };
                img.src = data.image;

                isUploaded = true;
                isCaptured = true;
                captureBtn.innerText = "Resume Live Video";
            } catch (err) {
                console.error("Upload error:", err);
                updateMetrics(emptyInfo("Upload Error", "Backend not responding"));
            }
        }

        captureBtn.addEventListener("click", toggleCapture);
        uploadBtn.addEventListener("click", () => imageUpload.click());
        imageUpload.addEventListener("change", uploadImage);

        updateMetrics(emptyInfo("Waiting...", "Waiting..."));
        startWebcam();
    </script>
</body>
</html>
